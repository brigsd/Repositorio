services:
  - type: web
    name: programa-educacao
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: programa-educacao-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false

databases:
  - name: programa-educacao-db
    plan: free
    databaseName: programa_educacao
    user: programa_educacao_user
